apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: {{ .name }}
servers: 1
agents: 2
kubeAPI:
  hostIP: {{ .gateway }}
  hostPort: "6443"
network: {{ .name }}
ports:
{{ if not (eq .localhostPort "") }}
- port: 127.0.0.1:{{ .localhostPort }}:443
  nodeFilters:
  - loadbalancer
{{ end }} 
- port: {{ .gateway }}:80:80
  nodeFilters:
  - loadbalancer
- port: {{ .gateway }}:443:443
  nodeFilters:
  - loadbalancer
hostAliases:
  - ip: {{ .gateway }}
    hostnames:
      - {{ .name }}.local
