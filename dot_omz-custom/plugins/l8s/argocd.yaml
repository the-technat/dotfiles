apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
  source:
    chart: argo-cd
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 5.x.x
    helm:
      values: |-
        configs:
          cm:
            url: "http://argocd.default"
            server.rbac.log.enforce.enable: "true"
            exec.enabled: "true"
            admin.enabled: "true"
          params:
            server.insecure: true
            controller.app.resync: 10
          rbac:
            policy.default: role:readonly

        server:
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts: [] # catch-all
