ingress:
  enabled: true
  annotations:
    ingress.kubernetes.io/ssl-redirect: "true"
  hosts: 
  - host: ""
    paths:
    - path: /dex
      pathType: Prefix

config:
  issuer: {{ .issuer }}
  oauth2:
    skipApprovalScreen: true
  storage:
    type: kubernetes
    config:
      inCluster: true
  connectors:
  - type: github
    id: github
    name: GitHub
    config:
      redirectURI: {{ .dexRedirectURI }}
      orgs:
      - name: {{ .org }}
      loadAllGroups: true
      clientID: {{ .client_id }}
      clientSecret: {{ .client_secret }}
  staticClients:
  - id: argocd
    secret: argocd
    name: ArgoCD
    redirectURIs:
      - {{ .argoRedirectURI }}
